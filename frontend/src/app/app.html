<div class="min-h-screen bg-slate-100 text-slate-900">
  <header class="border-b border-slate-200 bg-white/90 backdrop-blur-sm">
    <div
      class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-5 md:flex-row md:items-center md:justify-between"
    >
      <div>
        <div
          class="inline-flex items-center gap-3 rounded-3xl bg-gradient-to-r from-[#d91c4d] via-[#e75b7f] to-[#ff9ab2] px-4 py-3 text-white shadow-lg shadow-[#d91c4560]"
        >
          <span class="text-lg font-semibold">Korp ERP</span>
          <span class="rounded-full bg-white/20 px-3 py-1 text-sm font-medium text-slate-100"
            >Teste</span
          >
        </div>
        <p class="mt-3 max-w-2xl text-sm text-slate-600 md:text-base">
          Sistema de estoque e faturamento integrado com microsserviços. Cadastre produtos e emita
          notas com débito automático de saldo.
        </p>
      </div>
      <nav class="flex flex-wrap items-center gap-3">
        <a
          routerLink="/produtos"
          routerLinkActive="!bg-slate-900 !text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-900 hover:text-white"
          >Estoque</a
        >
        <a
          routerLink="/notas"
          routerLinkActive="!bg-slate-900 !text-white"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-900 hover:text-white"
          >Notas Fiscais</a
        >
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-8">
    <div
      class="rounded-[32px] bg-white p-6 shadow-[0_20px_70px_-30px_rgba(0,0,0,0.25)] ring-1 ring-slate-200"
    >
      <router-outlet></router-outlet>
    </div>
  </main>
  <toast-panel></toast-panel>
</div>
